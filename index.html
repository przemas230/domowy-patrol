<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2d6a10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Domowy Patrol">
<title>🏠 Domowy Patrol</title>
<!-- PWA manifest injected via JS -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232d6a10'/><text y='.9em' font-size='72' x='12'>🏠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ══ THEMES ══ */
:root,[data-theme="light"]{
  --g1:#1a3a0a;--g2:#2d6a10;--g3:#4a9e22;--gp:#eaf5e2;
  --y:#f5c518;--o:#f07b20;--r:#e84040;--b:#3b82f6;--pu:#8b5cf6;
  --bg:#f2f6ee;--card:#ffffff;--text:#18280a;--soft:#6b7c5a;
  --border:#d0e8b8;--sh:0 2px 16px rgba(45,106,16,.10);
  --rr:18px;--font:'Nunito',sans-serif;--inp:#f2f6ee;
  --hdr:linear-gradient(135deg,#1a3a0a,#2d6a10 55%,#4a9e22);
  --tab:#ffffff;--tab-blur:0px;
}
[data-theme="dark"]{
  --g1:#091503;--g2:#1a4008;--g3:#2a6e10;--gp:#0c2207;
  --y:#f5c518;--o:#f07b20;--r:#e84040;--b:#60a5fa;--pu:#a78bfa;
  --bg:#0a130a;--card:#131f0e;--text:#c8e6b0;--soft:#6a8a5a;
  --border:#1e3815;--sh:0 2px 20px rgba(0,0,0,.5);
  --rr:18px;--font:'Nunito',sans-serif;--inp:#0a130a;
  --hdr:linear-gradient(135deg,#040b03,#0d2206 55%,#1a4008);
  --tab:#131f0e;--tab-blur:0px;
}
[data-theme="win"]{
  --g1:#003087;--g2:#0050c8;--g3:#1a80e0;--gp:#dde8ff;
  --y:#ffb900;--o:#f07b20;--r:#c40e0e;--b:#0067bf;--pu:#6b3fa0;
  --bg:#e8e8e8;--card:#ffffff;--text:#1a1a1a;--soft:#595959;
  --border:#b8b8b8;--sh:0 1px 3px rgba(0,0,0,.2);
  --rr:3px;--font:'Segoe UI','DM Sans',sans-serif;--inp:#ffffff;
  --hdr:linear-gradient(135deg,#003087,#0050c8 55%,#1a80e0);
  --tab:#f0f0f0;--tab-blur:0px;
}
[data-theme="android"]{
  --g1:#145214;--g2:#1b7a1b;--g3:#2ea82e;--gp:#e0f5e0;
  --y:#f9be00;--o:#f57c00;--r:#d32f2f;--b:#1565c0;--pu:#6a1b9a;
  --bg:#f5f5f5;--card:#ffffff;--text:#1a1a1a;--soft:#666;
  --border:#d0d0d0;--sh:0 1px 8px rgba(0,0,0,.15),0 4px 16px rgba(0,0,0,.08);
  --rr:16px;--font:'Roboto','DM Sans',sans-serif;--inp:#f5f5f5;
  --hdr:linear-gradient(135deg,#145214,#1b7a1b 55%,#2ea82e);
  --tab:#ffffff;--tab-blur:0px;
}
[data-theme="ios"]{
  --g1:#1a5c28;--g2:#34c759;--g3:#30d160;--gp:#f0fff5;
  --y:#ffcc00;--o:#ff9500;--r:#ff3b30;--b:#007aff;--pu:#af52de;
  --bg:#f2f2f7;--card:#ffffff;--text:#1c1c1e;--soft:#8e8e93;
  --border:#c8c8cc;--sh:0 1px 0 rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --rr:14px;--font:-apple-system,'DM Sans',sans-serif;--inp:#f2f2f7;
  --hdr:linear-gradient(135deg,#1a5c28,#34c759 60%,#30d160);
  --tab:rgba(249,249,249,.94);--tab-blur:20px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px;transition:background .3s,color .3s;}

/* ── SPLASH ── */
#splashScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 18px;background:linear-gradient(160deg,#1a3a0a,#2d6a10 50%,#4a9e22);}
.sp-logo{font-size:68px;animation:bob 2.2s ease-in-out infinite;margin-bottom:6px;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.sp-title{font-family:'Fredoka One',cursive;font-size:30px;color:#fff;margin-bottom:3px;}
.sp-sub{font-size:12px;color:rgba(255,255,255,.65);margin-bottom:18px;text-align:center;line-height:1.5;}
.lang-row{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;justify-content:center;}
.lang-btn{padding:5px 10px;border-radius:20px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);font-size:11px;font-weight:800;color:#fff;cursor:pointer;transition:all .15s;}
.lang-btn.sel{background:rgba(255,255,255,.88);color:#1a3a0a;}
.g-btn{display:flex;align-items:center;gap:10px;background:#fff;border-radius:13px;padding:12px 18px;font-family:var(--font);font-size:14px;font-weight:800;color:#1a1a1a;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);width:100%;max-width:290px;justify-content:center;transition:transform .1s;margin-bottom:8px;}
.g-btn:active{transform:scale(.97);}
.g-ico{width:19px;height:19px;}
.sp-div{display:flex;align-items:center;gap:9px;width:100%;max-width:290px;margin:5px 0 9px;}
.sp-div span{font-size:10px;color:rgba(255,255,255,.45);white-space:nowrap;}
.sp-div::before,.sp-div::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.2);}
.demo-row{display:flex;gap:8px;width:100%;max-width:290px;}
.demo-btn{flex:1;padding:10px 6px;border-radius:13px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);font-family:var(--font);font-size:12px;font-weight:800;color:#fff;cursor:pointer;text-align:center;line-height:1.3;transition:all .15s;}
.demo-btn .db-ico{font-size:22px;display:block;margin-bottom:3px;}
.demo-badge{background:var(--y);color:#1a1a1a;font-size:9px;font-weight:900;border-radius:5px;padding:1px 5px;display:inline-block;margin-bottom:4px;}
.sp-note{font-size:9px;color:rgba(255,255,255,.38);margin-top:10px;text-align:center;}

/* ── INVITE LANDING ── */
#inviteScreen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:28px 20px;background:linear-gradient(160deg,#1a3a0a,#2d6a10 50%,#4a9e22);}
.invite-card{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:340px;box-shadow:0 10px 44px rgba(0,0,0,.22);text-align:center;}
.invite-family-ico{font-size:52px;margin-bottom:8px;}
.invite-title{font-family:'Fredoka One',cursive;font-size:20px;color:#1a1a1a;margin-bottom:4px;}
.invite-sub{font-size:12px;color:#666;margin-bottom:16px;line-height:1.5;}
.invite-family-name{font-size:22px;font-weight:900;color:#2d6a10;margin:10px 0;}
.invite-g-btn{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #d0e8b8;border-radius:12px;padding:12px 18px;font-family:var(--font);font-size:13px;font-weight:800;color:#1a1a1a;cursor:pointer;width:100%;justify-content:center;margin-bottom:9px;}
.invite-noauth-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#2d6a10,#4a9e22);color:#fff;font-family:var(--font);font-size:13px;font-weight:900;cursor:pointer;}

/* ── SETUP ── */
#setupScreen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:22px 18px;background:linear-gradient(160deg,#1a3a0a,#2d6a10 50%,#4a9e22);}
.s-card{background:var(--card);border-radius:20px;padding:18px;width:100%;max-width:340px;box-shadow:0 10px 44px rgba(0,0,0,.22);color:var(--text);}
.s-title{font-family:'Fredoka One',cursive;font-size:20px;margin-bottom:12px;text-align:center;}
.s-lbl{font-size:10px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;margin-top:9px;}
.s-inp{width:100%;padding:10px 12px;border-radius:10px;border:2px solid var(--border);background:var(--inp);font-family:var(--font);font-size:14px;font-weight:700;color:var(--text);outline:none;transition:border .2s;}
.s-inp:focus{border-color:var(--g2);}
.role-row{display:flex;gap:7px;margin-top:6px;}
.role-btn{flex:1;padding:8px 4px;border-radius:9px;border:2.5px solid var(--border);background:var(--inp);font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;text-align:center;transition:all .15s;color:var(--text);}
.role-btn.sel{background:var(--gp);border-color:var(--g2);color:var(--g2);}
.av-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:6px;}
.av-btn{aspect-ratio:1;border-radius:10px;border:2.5px solid var(--border);background:var(--inp);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.av-btn.sel{border-color:var(--g2);background:var(--gp);transform:scale(1.1);}
.s-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--g2),var(--g3));color:#fff;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;margin-top:12px;}
.s-btn:active{transform:scale(.97);}

/* ── PENDING APPROVAL ── */
#pendingScreen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:28px 20px;background:linear-gradient(160deg,#1a3a0a,#2d6a10 50%,#4a9e22);}
.pending-card{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:340px;text-align:center;}
.pending-ico{font-size:52px;margin-bottom:10px;}
.pending-title{font-family:'Fredoka One',cursive;font-size:20px;color:#1a1a1a;margin-bottom:6px;}
.pending-sub{font-size:12px;color:#666;line-height:1.6;}
.pending-check{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#2d6a10,#4a9e22);color:#fff;font-family:var(--font);font-size:13px;font-weight:900;cursor:pointer;margin-top:14px;}

/* ── HEADER ── */
.hdr{background:var(--hdr);padding:13px 13px 16px;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;top:-32px;right:-32px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06);}
.h-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.app-name{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;}
.app-dt{font-size:9px;color:rgba(255,255,255,.6);}
.user-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:30px;padding:4px 9px;cursor:pointer;position:relative;}
.chip-photo{width:24px;height:24px;border-radius:50%;object-fit:cover;}
.chip-av{font-size:16px;}
.chip-nm{font-size:11px;font-weight:800;color:#fff;}
.chip-role{font-size:9px;color:rgba(255,255,255,.7);}
.notif-badge{position:absolute;top:-2px;right:-2px;width:12px;height:12px;background:var(--r);border-radius:50%;border:2px solid transparent;font-size:7px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;}
.prog-row{display:flex;align-items:center;gap:8px;}
.prog-wrap{flex:1;height:7px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--y),var(--o));border-radius:99px;transition:width .6s;}
.prog-lbl{color:#fff;font-size:10px;font-weight:800;white-space:nowrap;}
.weather-strip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border-radius:9px;padding:5px 10px;margin-top:6px;font-size:10px;color:#fff;cursor:pointer;}
.ws-ico{font-size:18px;}
.ws-temp{font-weight:900;font-size:13px;}
.ws-desc{color:rgba(255,255,255,.7);font-size:10px;flex:1;}
.ws-diff{font-size:9px;font-weight:800;padding:2px 5px;border-radius:5px;background:rgba(255,255,255,.12);}

/* ── DEMO BAR ── */
.demo-bar{background:var(--y);padding:5px 12px;font-size:10px;font-weight:800;color:#1a1a1a;display:flex;justify-content:space-between;align-items:center;}
.demo-bar-exit{cursor:pointer;text-decoration:underline;}

/* ── TABS ── */
.tabs{display:flex;background:var(--tab);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(var(--tab-blur));}
.tab{flex:1;padding:9px 1px 7px;border:none;background:none;font-family:var(--font);font-size:9px;font-weight:700;color:var(--soft);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s;position:relative;}
.tab .ti{font-size:17px;}
.tab.on{color:var(--g2);border-bottom-color:var(--g2);}
.ndot{position:absolute;top:4px;right:calc(50% - 14px);width:6px;height:6px;border-radius:50%;background:var(--r);border:1.5px solid var(--tab);display:none;}
.ndot.show{display:block;}

/* ── SECTIONS ── */
.sec{display:none;padding:11px;}
.sec.on{display:block;}
.sec-ttl{font-family:'Fredoka One',cursive;font-size:18px;margin-bottom:10px;color:var(--text);}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--rr);box-shadow:var(--sh);padding:11px;margin-bottom:10px;}
.card-ttl{font-size:12px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;color:var(--text);}
.card-ttl .ct-l{display:flex;align-items:center;gap:5px;}
.card-act{font-size:10px;font-weight:800;color:var(--g2);background:var(--gp);border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-family:var(--font);}

/* ── RETURN BANNER ── */
#returnBanner{display:none;}
.rb{padding:11px 13px;display:flex;align-items:center;gap:8px;}
.rb-green{background:linear-gradient(135deg,var(--g1),var(--g2));}
.rb-orange{background:linear-gradient(135deg,#92400e,var(--o));}
.rb-red{background:linear-gradient(135deg,#7f1d1d,var(--r));}
.rb-ico{font-size:22px;flex-shrink:0;}
.rb-info{flex:1;min-width:0;}
.rb-title{font-size:12px;font-weight:900;color:#fff;}
.rb-sub{font-size:9px;color:rgba(255,255,255,.75);margin-top:1px;}
.rb-btns{display:flex;gap:4px;flex-shrink:0;}
.rb-btn{padding:5px 7px;border-radius:7px;border:1.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.15);color:#fff;font-family:var(--font);font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap;}
.rb-btn.solid{background:rgba(255,255,255,.88);color:#1a1a1a;}

/* ── CURFEW PANEL ── */
.curfew-card{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:var(--rr);padding:11px;margin-bottom:10px;color:#fff;}
.curfew-ttl{font-family:'Fredoka One',cursive;font-size:14px;margin-bottom:7px;}
.child-row{display:flex;align-items:center;gap:7px;padding:7px;background:rgba(255,255,255,.1);border-radius:9px;margin-bottom:5px;}
.child-row:last-child{margin-bottom:0;}
.cr-av{font-size:22px;}
.cr-info{flex:1;min-width:0;}
.cr-nm{font-size:12px;font-weight:800;}
.cr-detail{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px;}
.cr-btn{padding:5px 9px;border-radius:7px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.12);color:#fff;font-family:var(--font);font-size:10px;font-weight:800;cursor:pointer;flex-shrink:0;}

/* ── ONLINE ── */
.online-row{display:flex;gap:5px;flex-wrap:wrap;}
.op{display:flex;align-items:center;gap:4px;background:var(--inp);border-radius:30px;padding:3px 8px;border:2px solid var(--border);font-size:10px;font-weight:700;color:var(--text);}
.odot{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 4px #22c55e;}

/* ── WEEK ── */
.week-row{display:flex;gap:3px;}
.dc{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 1px;border-radius:8px;background:var(--inp);border:2px solid var(--border);font-size:8px;font-weight:700;color:var(--soft);cursor:pointer;transition:all .15s;}
.dc:hover{border-color:var(--g2);}
.dc.today{background:var(--gp);border-color:var(--g2);}
.dc.today .dd{color:var(--g2);}
.dc.selected{border-color:var(--b);background:rgba(59,130,246,.08);}
.dc .dd{font-size:12px;font-weight:900;color:var(--text);}
.dc .dot{width:5px;height:5px;border-radius:50%;background:var(--border);}
.dc.full .dot{background:var(--g2);}
.dc.partial .dot{background:var(--y);}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;gap:6px;margin-bottom:8px;}
.vt-btn{flex:1;padding:6px;border-radius:8px;border:2px solid var(--border);background:var(--inp);font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;color:var(--text);text-align:center;transition:all .15s;}
.vt-btn.sel{background:var(--gp);border-color:var(--g2);color:var(--g2);}

/* ── CHORES NORMAL VIEW ── */
.cat-lbl{font-size:10px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.6px;margin:9px 0 4px;display:flex;align-items:center;justify-content:space-between;}
.cat-edit-btns{display:flex;gap:4px;}
.cat-mini-btn{font-size:9px;padding:2px 6px;border-radius:5px;border:1.5px solid var(--border);background:var(--inp);cursor:pointer;font-family:var(--font);font-weight:700;color:var(--soft);}
.chore-list{display:flex;flex-direction:column;gap:5px;}
.chore{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:11px;border:2px solid var(--border);background:var(--inp);cursor:pointer;transition:all .18s;position:relative;}
.chore:active{transform:scale(.98);}
.chore.done{background:var(--gp);border-color:var(--g3);}
.chore.done-past{background:var(--gp);border-color:var(--g3);opacity:.7;}
.chore.assigned{border-color:var(--b);background:rgba(59,130,246,.05);}
.chore.overdue{border-color:var(--r);background:rgba(232,64,64,.04);}
.chore-ico{font-size:22px;min-width:28px;text-align:center;}
.chore-info{flex:1;min-width:0;}
.chore-name{font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.chore-meta{font-size:9px;color:var(--soft);margin-top:1px;}
.chore.done .chore-name,.chore.done-past .chore-name{text-decoration:line-through;color:var(--soft);}
.chore-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.chore-pts{font-size:10px;font-weight:900;color:var(--o);background:rgba(240,123,32,.1);border-radius:6px;padding:2px 5px;}
.done-badge{font-size:10px;font-weight:800;color:var(--g2);background:var(--gp);border-radius:6px;padding:2px 5px;}
.undo-btn{font-size:9px;font-weight:800;color:var(--o);border:1.5px solid var(--o);background:transparent;border-radius:5px;padding:1px 5px;cursor:pointer;font-family:var(--font);}
.repeat-btn{font-size:9px;font-weight:800;color:var(--b);border:1.5px solid var(--b);background:rgba(59,130,246,.08);border-radius:5px;padding:1px 5px;cursor:pointer;font-family:var(--font);}
.repeat-count{font-size:9px;color:var(--b);font-weight:800;margin-top:1px;}

/* ── CHORES COMPACT VIEW ── */
.compact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.compact-tile{aspect-ratio:1;border-radius:11px;border:2px solid var(--border);background:var(--inp);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px;transition:all .18s;text-align:center;}
.compact-tile:active{transform:scale(.94);}
.compact-tile.done{background:var(--gp);border-color:var(--g3);}
.compact-tile.done .ct-ico{filter:grayscale(.4);}
.ct-ico{font-size:20px;}
.ct-nm{font-size:8px;font-weight:800;color:var(--text);line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.compact-tile.done .ct-nm{text-decoration:line-through;color:var(--soft);}

function fmt(d){return d.toISOString().split('T')[0];}

function fmtDue(ts){const d=new Date(ts);return`${d2(d.getDate())}.${d2(d.getMonth()+1)} ${d2(d.getHours())}:${d2(d.getMinutes())}`;}

/* ══════ WEATHER ══════ */
async function fetchWeather(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current=temperature_2m,weathercode,apparent_temperature&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=2`;
      const r=await fetch(url);const d=await r.json();
      const c=d.current;const tomorrow=d.daily;
      weatherData={temp:Math.round(c.temperature_2m),feels:Math.round(c.apparent_temperature),code:c.weathercode,tomorrowMax:Math.round(tomorrow.temperature_2m_max[1]),tomorrowMin:Math.round(tomorrow.temperature_2m_min[1]),tomorrowCode:tomorrow.weathercode[1],yesterdayDiff:Math.round(c.temperature_2m-(tomorrow.temperature_2m_max[0]+tomorrow.temperature_2m_min[0])/2)};
      renderWeather();
    }catch(e){}
  },{timeout:10000});
}
function wmoIcon(code){if(code===0)return'☀️';if(code<=3)return'⛅';if(code<=49)return'🌫️';if(code<=67)return'🌧️';if(code<=77)return'❄️';if(code<=82)return'🌦️';return'⛈️';}
function renderWeather(){
  if(!weatherData) return;
  const w=weatherData;
  const diff=w.yesterdayDiff;
  const diffStr=diff>0?`▲${diff}°`:(diff<0?`▼${Math.abs(diff)}°`:'→ tyle samo');
  const diffColor=diff>0?'#ff9500':diff<0?'#007aff':'#8e8e93';
  const chip=document.getElementById('weatherChip');
  chip.style.display='flex';
  chip.innerHTML=`<div class="weather-ico">${wmoIcon(w.code)}</div><div><div class="weather-temp">${w.temp}°C <span style="font-size:9px;opacity:.7">odczuwalnie ${w.feels}°C</span></div><div class="weather-desc">Jutro: ${w.tomorrowMin}–${w.tomorrowMax}°C ${wmoIcon(w.tomorrowCode)}</div></div><div class="weather-compare" style="color:${diffColor}">${diffStr} vs wczoraj</div>`;
}

function updateReturnBanner(){
  if(myProfile?.role!=='child'){document.getElementById('returnBanner').style.display='none';clearReturnTimers();return;}
  const uid=getMyUid();const curfew=live.curfews[uid];const banner=document.getElementById('returnBanner');
  if(!curfew||!curfew.active){banner.style.display='none';clearReturnTimers();return;}
  const now=new Date();const[hh,mm]=curfew.time.split(':').map(Number);
  const rt=new Date(now);rt.setHours(hh,mm,0,0);const diffMs=rt.getTime()-now.getTime();const diffMin=Math.round(diffMs/60000);
  const interval=curfew.reminderInterval||reminderInterval||15;
  banner.style.display='block';
  if(diffMin>60){
    banner.innerHTML=`<div class="rb rb-green"><div class="rb-ico">🏠</div><div class="rb-info"><div class="rb-title">Wracaj o ${curfew.time} · ustalone przez ${curfew.setBy}</div><div class="rb-sub">Za ${diffMin} min · co ${interval} min przypomnienie</div></div></div>`;
    clearReturnTimers();if(diffMs-60*MS.min>0) returnTimers.push(setTimeout(()=>updateReturnBanner(),diffMs-60*MS.min));
  } else if(diffMin>0){
    banner.innerHTML=`<div class="rb rb-orange"><div class="rb-ico" style="animation:bob .8s ease-in-out infinite">🏃</div><div class="rb-info"><div class="rb-title">⏰ Wracaj! Zostało ${diffMin} min (${curfew.time})</div><div class="rb-sub">Ustalone przez ${curfew.setBy}</div></div><div class="rb-btns"><button class="rb-btn" onclick="notYet()">Jeszcze chwilę</button><button class="rb-btn solid" onclick="iAmHeading()">Wracam! 🏃</button></div></div>`;
    clearReturnTimers();scheduleReturnReminders(curfew.time,interval);
  } else {
    banner.innerHTML=`<div class="rb rb-red"><div class="rb-ico">❗</div><div class="rb-info"><div class="rb-title">POWINIENEŚ JUŻ BYĆ W DOMU! (${curfew.time})</div><div class="rb-sub">Zadzwoń do rodzica lub kliknij że wracasz</div></div><div class="rb-btns"><button class="rb-btn solid" onclick="iAmHeading()">Wracam! 🏃</button></div></div>`;
    sendBrowserNotif('❗ Czas minął!',`Miałeś/aś wrócić o ${curfew.time}!`);
  }
}
function scheduleReturnReminders(time,intervalMin){
  clearReturnTimers();
  const[hh,mm]=time.split(':').map(Number);const rt=new Date();rt.setHours(hh,mm,0,0);
  const diffMs=rt.getTime()-Date.now();if(diffMs<=0) return;
  const steps=Math.ceil(diffMs/(intervalMin*MS.min));
  for(let i=1;i<=steps;i++){
    const fireAt=Date.now()+i*intervalMin*MS.min;
    if(fireAt<rt.getTime()+60000){
      returnTimers.push(setTimeout(()=>{
        const left=Math.round((rt.getTime()-Date.now())/MS.min);
        sendBrowserNotif('🏠 Czas wracać!',`Zostało ${left} min (${time})`);
        showToast(`🏠 Wracaj! ~${left} min!`);updateReturnBanner();
      },fireAt-Date.now()));
    }
  }
}

function renderAssigned(){
  const uid=getMyUid();
  const items=Object.entries(live.assigned).map(([k,v])=>({...v,key:k})).sort((a,b)=>(a.dueTs||0)-(b.dueTs||0));
  const mine=myProfile.role==='parent'?items:items.filter(t=>t.forUid===uid||t.forName===myProfile.name);

  document.getElementById('globalIntervalRow').innerHTML=REMINDER_OPTIONS.map(m=>`<button class="int-btn ${reminderInterval===m?'sel':''}" onclick="setGlobalInt(${m})">${m} min</button>`).join('');
}
window.setGlobalInt=function(m){reminderInterval=m;renderGlobalIntervalRow();showToast(`⏰ Co ${m} min`);};

/* ══════ NOTIFICATIONS ══════ */
function requestNotifPermission(){if('Notification' in window&&Notification.permission==='default') Notification.requestPermission();}
function sendBrowserNotif(title,body){if('Notification' in window&&Notification.permission==='granted') new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>'});}
function scheduleLocalNotif(n,f,ts){const d=ts-Date.now();if(d>0&&d<172800000) setTimeout(()=>sendBrowserNotif('⏰ Czas na zadanie!',`${f}: ${n}`),d);}

/* ══════ GOOGLE CALENDAR ══════ */
function toggleGCal(){
  if(gcalToken){gcalToken=null;document.getElementById('gcalStatus').textContent='Kliknij, aby połączyć';showToast('📅 Odłączono');return;}
  if(GCAL_CLIENT_ID.includes('WKLEJ')){showToast('⚠️ GCAL_CLIENT_ID jeszcze nie skonfigurowany — wrócimy razem');return;}
  const url=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${GCAL_CLIENT_ID}&redirect_uri=${encodeURIComponent(location.origin+location.pathname)}&response_type=token&scope=${encodeURIComponent(GCAL_SCOPE)}&prompt=consent`;
  const pop=window.open(url,'gcal','width=500,height=600');
  const t=setInterval(()=>{try{if(pop.closed){clearInterval(t);return;}const h=pop.location.hash;if(h&&h.includes('access_token')){gcalToken=new URLSearchParams(h.slice(1)).get('access_token');pop.close();clearInterval(t);document.getElementById('gcalStatus').textContent='✅ Połączono';showToast('📅 Połączono z Google Calendar!');}}catch(e){}},500);
}
window.toggleGCal=toggleGCal;
async function addToGCal(name,ico,date,time,pts){
  if(!gcalToken) return;
  const s=time?`${date}T${time}:00`:`${date}`;
  const e=time?`${date}T${d2(parseInt(time.split(':')[0]))}:${d2(parseInt(time.split(':')[1]||0)+30)}:00`:`${date}`;
  await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',headers:{Authorization:`Bearer ${gcalToken}`,'Content-Type':'application/json'},body:JSON.stringify({summary:`${ico} ${name} (+${pts}⭐)`,description:'Domowy Patrol',start:time?{dateTime:s,timeZone:'Europe/Warsaw'}:{date:s},end:time?{dateTime:e,timeZone:'Europe/Warsaw'}:{date:e}})});
  showToast('📅 Dodano do Google Calendar!');
}

/* ══════ MISC ══════ */
function copyCode(){navigator.clipboard.writeText(fCode).then(()=>showToast('📋 Skopiowano: '+fCode));}
window.copyCode=copyCode;
function closeOverlay(id){document.getElementById(id).classList.remove('show');}
window.closeOverlay=closeOverlay;
async function doSignOut(){if(!confirm('Wylogować?')) return;if(isDemo){exitDemo();return;}await signOut(auth);}
window.doSignOut=doSignOut;
let tt;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600);}
window.showToast=showToast;
function goTab(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  const idx={today:0,tasks:1,scores:2,summary:3,more:4}[id];
  document.querySelectorAll('.tab')[idx]?.classList.add('on');
  if(id==='scores'){renderScores();renderStats();renderRewards();}
  if(id==='summary'){renderSummary();renderHistory();}
  if(id==='more'){renderCategoryMgmt();renderScheduleView();if(myProfile?.role==='parent')renderMaps();}
}
window.goTab=goTab;
</script>
